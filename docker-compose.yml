services:
  db:
    image: postgres:16-alpine
    container_name: questlog_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - questlog_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      # Server Actions' allowed origins are baked into the standalone build, so
      # the public origin must be available at build time, not just runtime.
      args:
        ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-}
    container_name: questlog_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      TZ: ${TZ:-Etc/GMT+8}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      REMINDER_SWEEP_MINUTES: ${REMINDER_SWEEP_MINUTES:-15}
      FCM_SERVICE_ACCOUNT_JSON: ${FCM_SERVICE_ACCOUNT_JSON:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      # Shared secret the Discord bot uses to authenticate to /api/bot/quests.
      BOT_API_SECRET: ${BOT_API_SECRET:-}
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Optional Discord bot: adds /addquest and /quests slash commands. Only useful
  # when DISCORD_BOT_TOKEN is set; otherwise the container just idles/exits.
  bot:
    build:
      context: ./bot
    container_name: questlog_bot
    depends_on:
      - app
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_APP_ID: ${DISCORD_APP_ID:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      BOT_API_SECRET: ${BOT_API_SECRET:-}
      # Internal URL of the app service on the compose network.
      APP_URL: ${BOT_APP_URL:-http://app:3000}
    restart: unless-stopped

volumes:
  questlog_pgdata:
